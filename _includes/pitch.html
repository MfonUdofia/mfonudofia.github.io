{% assign text = site.data.sitetext[site.locale].pitch | default: site.data.sitetext.pitch %}

<section class="page-section" id="{{ text.section | default: 'pitch' }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ text.title | default: 'Pitch' }}</h2>
        <h3 class="section-subheading text-muted">{{ text.text }}</h3>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col-lg-9 text-center">
        <p class="large text-muted">{{ text.body }}</p>
        {% if text.button %}
          <!-- First Button -->
<a class="btn btn-primary btn-xl text-uppercase js-scroll-trigger mt-4" href="{{ text.buttonlink | default: '#contact' }}">{{ text.button }}</a>

<!-- Second Button -->
{% if text.button2 %}
  <a class="btn btn-primary btn-xl text-uppercase js-scroll-trigger mt-4" href="{{ text.buttonlink2 | default: '#portfolio' }}" style="margin-left: 15px;">{{ text.button2 }}</a>
{% endif %}  
        {% endif %}
      </div>
    </div>
  </div>
</section>
