{% assign text = site.data.sitetext[site.locale].pitch | default:
site.data.sitetext.pitch %}

<section class="page-section" id="{{ text.section | default: 'pitch' }}">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading text-uppercase">
                    {{ text.title | default: 'Pitch' }}
                </h2>
                <h3 class="section-subheading text-muted">{{ text.text }}</h3>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-9 text-center">
                <div
                    class="video-scrub-container"
                    style="
                        margin: 40px 0;
                        cursor: pointer;
                        position: relative;
                        overflow: hidden;
                        background-color: #eeeff0;
                        padding: 20px;
                        border-radius: 0;
                        box-shadow: none;
                        z-index: 10;
                    "
                >
                    <video
                        id="pitchVideo"
                        src="{{ '/assets/Elevator Pitch Final comp.mp4' | relative_url }}"
                        preload="auto"
                        muted
                        playsinline
                        style="
                            width: 100%;
                            display: block;
                            pointer-events: none;
                            border-radius: 0;
                        "
                    ></video>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-9 text-center">
                <p class="large text-muted">{{ text.body }}</p>

                <!-- First Button -->
                {% if text.button %}
                <a
                    class="btn btn-primary btn-xl text-uppercase js-scroll-trigger mt-4"
                    href="{{ text.buttonlink | default: '#contact' }}"
                    >{{ text.button }}</a
                >
                {% endif %}

                <!-- Second Button -->
                {% if text.button2 %}
                <a
                    class="btn btn-primary btn-xl text-uppercase js-scroll-trigger mt-4"
                    href="{{ text.buttonlink2 | default: '#portfolio' }}"
                    style="margin-left: 15px"
                    >{{ text.button2 }}</a
                >
                {% endif %}
            </div>
        </div>
    </div>
</section>

<script>
    (function () {
        function initVideoScrub() {
            const container = document.querySelector(".video-scrub-container");
            const video = document.getElementById("pitchVideo");

            if (!container || !video) return;

            const handleMouseMove = (e) => {
                if (video.paused || video.muted) {
                    const rect = container.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const width = rect.width;
                    const percentage = x / width;

                    if (video.duration) {
                        video.currentTime = percentage * video.duration;
                    }
                }
            };

            const handleClick = () => {
                if (video.paused) {
                    video.muted = false;
                    video
                        .play()
                        .catch((err) => console.error("Playback failed:", err));
                } else {
                    video.pause();
                }
            };

            container.addEventListener("mousemove", handleMouseMove);
            container.addEventListener("click", handleClick);

            video.addEventListener("ended", () => {
                video.muted = true;
                video.pause();
            });
        }

        if (document.readyState === "complete") {
            initVideoScrub();
        } else {
            window.addEventListener("load", initVideoScrub);
        }
    })();
</script>
